version: '3.9'
services:
  api:
    build: ./backend/src/Api
    ports: ["8080:8080"]
    environment:
      ASPNETCORE_URLS: http://+:8080
    depends_on: [sqlserver, redis]
  frontend:
    build: ./frontend
    ports: ["5173:80"]
    depends_on: [api]
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: StrongPassword!123
      ACCEPT_EULA: Y
    ports: ["1433:1433"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  nginx:
    image: nginx:1.27
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports: ["80:80"]
    depends_on: [api, frontend]
